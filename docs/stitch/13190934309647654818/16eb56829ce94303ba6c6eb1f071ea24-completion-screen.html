<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center">
<!-- TopAppBar Suppressed per Destination Rule: Onboarding/Success Screens hide global navigation -->
<main class="w-full max-w-md px-8 py-12 flex flex-col items-center text-center">
<!-- Success Illustration/Icon Container -->
<div class="relative mb-12 flex items-center justify-center">
<!-- Decorative Background Element (Asymmetric Depth) -->
<div class="absolute -z-10 w-48 h-48 bg-secondary-container opacity-20 rounded-[2.5rem] rotate-12"></div>
<div class="absolute -z-10 w-48 h-48 bg-primary-fixed-dim opacity-10 rounded-[3rem] -rotate-6"></div>
<!-- Success Visual -->
<div class="w-24 h-24 signature-gradient rounded-xl flex items-center justify-center shadow-[0_24px_48px_rgba(0,108,71,0.12)]">
<span class="material-symbols-outlined text-on-primary text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Typography Stack -->
<div class="space-y-4 mb-12">
<h1 class="font-headline text-[2rem] font-extrabold tracking-tight text-on-surface leading-tight">
                All set! Welcome to CityConnect.
            </h1>
<p class="text-on-surface-variant text-lg leading-relaxed px-4">
                You're ready to explore services or manage your business.
            </p>
</div>
<!-- Progress Indicator (Step 5 of 5) - Subtle/Tonal -->
<div class="flex gap-2 mb-12">
<div class="h-1.5 w-6 rounded-full bg-primary opacity-20"></div>
<div class="h-1.5 w-6 rounded-full bg-primary opacity-20"></div>
<div class="h-1.5 w-6 rounded-full bg-primary opacity-20"></div>
<div class="h-1.5 w-6 rounded-full bg-primary opacity-20"></div>
<div class="h-1.5 w-12 rounded-full signature-gradient"></div>
</div>
<!-- Call to Action -->
<div class="w-full space-y-6">
<button class="w-full signature-gradient text-on-primary font-label font-semibold py-4 rounded-xl shadow-[0_8px_20px_rgba(0,107,71,0.15)] active:scale-95 active:opacity-90 transition-all duration-200">
                Continue to app
            </button>
<p class="text-on-surface-variant text-sm font-medium">
                Setting up your workspace...
            </p>
</div>
<!-- Supporting High-End Card (Editorial Style) -->
<div class="mt-16 w-full text-left">
<div class="bg-surface-container-low rounded-xl p-6 relative overflow-hidden group">
<!-- Subtle Gradient Bleed -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-[0.03] rounded-full -mr-16 -mt-16"></div>
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb">lightbulb</span>
</div>
<div class="space-y-1">
<p class="font-headline font-bold text-on-surface">Pro Tip</p>
<p class="text-on-surface-variant text-sm leading-snug">
                            Check your email for a curated guide on how to get the most out of our urban marketplace.
                        </p>
</div>
</div>
</div>
</div>
