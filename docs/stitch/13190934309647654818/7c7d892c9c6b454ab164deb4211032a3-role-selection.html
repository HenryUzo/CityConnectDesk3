<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CityConnect - Choose Your Role</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#3e4942",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#ffffff",
                    "primary-container": "#00875a",
                    "secondary-fixed": "#c2ecd2",
                    "secondary-container": "#c0e9cf",
                    "on-secondary-fixed": "#002113",
                    "on-secondary-fixed-variant": "#294e3b",
                    "on-tertiary-fixed-variant": "#7d2a2a",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#456a56",
                    "on-primary-fixed-variant": "#005235",
                    "surface-container": "#edeeef",
                    "primary-fixed-dim": "#71dba6",
                    "on-error": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "surface-container-low": "#f3f4f5",
                    "on-error-container": "#93000a",
                    "background": "#f8f9fa",
                    "secondary-fixed-dim": "#a7d0b7",
                    "on-background": "#191c1d",
                    "primary-fixed": "#8df7c1",
                    "primary": "#006b47",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary-fixed": "#410005",
                    "outline": "#6e7a71",
                    "surface-container-high": "#e7e8e9",
                    "on-surface": "#191c1d",
                    "tertiary-fixed-dim": "#ffb3af",
                    "inverse-surface": "#2e3132",
                    "on-primary-fixed": "#002113",
                    "tertiary-fixed": "#ffdad7",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary": "#416652",
                    "tertiary-container": "#ba5855",
                    "outline-variant": "#bdcac0",
                    "surface-container-highest": "#e1e3e4",
                    "tertiary": "#9b403e",
                    "surface-variant": "#e1e3e4",
                    "inverse-primary": "#71dba6",
                    "surface-tint": "#006c47",
                    "surface-dim": "#d9dadb",
                    "error": "#ba1a1a",
                    "surface": "#f8f9fa"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        h1, h2, .brand-text {
            font-family: 'Manrope', sans-serif;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #006b47 0%, #00875a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Execution from JSON -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-lg dark:bg-slate-950/80 shadow-[0_4px_24px_rgba(0,108,71,0.04)]">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-700 dark:text-emerald-500" data-icon="location_city">location_city</span>
<span class="text-xl font-extrabold tracking-tighter text-emerald-700 dark:text-emerald-400">CityConnect</span>
</div>
<div class="flex items-center gap-2">
<button class="font-manrope text-lg font-bold tracking-tight text-slate-500 dark:text-slate-400 px-4 py-2 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors rounded-xl active:opacity-70 active:scale-95">Skip</button>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12">
<!-- Onboarding Header Section -->
<div class="w-full max-w-xl text-center mb-12">
<!-- Step Indicator -->
<div class="flex justify-center gap-2 mb-8">
<div class="h-1.5 w-12 rounded-full bg-secondary-fixed"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container-high"></div>
</div>
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-3">Choose your role</h1>
<p class="text-on-surface-variant text-lg">Tell us how you will use CityConnect.</p>
</div>
<!-- Role Selection Grid -->
<div class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
<!-- Resident Card (Selected State Emulated) -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container-lowest border-2 border-primary shadow-[0_8px_30px_rgba(0,108,71,0.08)] transition-all duration-300 text-left overflow-hidden">
<!-- Selected Badge -->
<div class="absolute top-4 right-4 bg-primary text-on-primary rounded-full p-1 flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="w-14 h-14 rounded-xl bg-emerald-50 flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<h2 class="text-2xl font-bold text-on-surface mb-2">Resident</h2>
<p class="text-on-surface-variant font-medium leading-relaxed">Find and manage home services</p>
<!-- Background Image Bleed for Asymmetry -->
<div class="absolute -bottom-4 -right-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-[120px]" data-icon="home">home</span>
</div>
</button>
<!-- Provider Card -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container-low border-2 border-transparent hover:border-outline-variant transition-all duration-300 text-left overflow-hidden">
<div class="w-14 h-14 rounded-xl bg-surface-container-high flex items-center justify-center mb-6 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="storefront">storefront</span>
</div>
<h2 class="text-2xl font-bold text-on-surface mb-2">Provider</h2>
<p class="text-on-surface-variant font-medium leading-relaxed">Grow your business and manage jobs</p>
<!-- Background Image Bleed for Asymmetry -->
<div class="absolute -bottom-4 -right-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-[120px]" data-icon="storefront">storefront</span>
</div>
</button>
</div>
<!-- Primary CTA -->
<div class="w-full max-w-xl flex flex-col items-center">
<button class="signature-gradient w-full py-4 rounded-xl text-on-primary font-bold text-lg shadow-lg hover:shadow-xl hover:opacity-95 active:scale-[0.98] transition-all mb-6">
                Continue
            </button>
<!-- Secondary Info -->
<p class="text-sm text-on-surface-variant/70 text-center max-w-xs">
                You can always switch your role later in your account settings.
            </p>
</div>
</main>
<!-- Contextual Aesthetic Background Elements -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-gradient-to-bl from-emerald-50/40 to-transparent blur-3xl rounded-full translate-x-1/2 -translate-y-1/4"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-gradient-to-tr from-secondary-fixed/30 to-transparent blur-3xl rounded-full -translate-x-1/4 translate-y-1/4"></div>
<!-- BottomNavBar Suppressed according to Shell Visibility Rule (Transactional flow) -->
</body></html>
