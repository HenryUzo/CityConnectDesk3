<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verify Your Contact - CityConnect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3e4942",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "primary-container": "#00875a",
                        "secondary-fixed": "#c2ecd2",
                        "secondary-container": "#c0e9cf",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#294e3b",
                        "on-tertiary-fixed-variant": "#7d2a2a",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#456a56",
                        "on-primary-fixed-variant": "#005235",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#71dba6",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "surface-container-low": "#f3f4f5",
                        "on-error-container": "#93000a",
                        "background": "#f8f9fa",
                        "secondary-fixed-dim": "#a7d0b7",
                        "on-background": "#191c1d",
                        "primary-fixed": "#8df7c1",
                        "primary": "#006b47",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-tertiary-fixed": "#410005",
                        "outline": "#6e7a71",
                        "surface-container-high": "#e7e8e9",
                        "on-surface": "#191c1d",
                        "tertiary-fixed-dim": "#ffb3af",
                        "inverse-surface": "#2e3132",
                        "on-primary-fixed": "#002113",
                        "tertiary-fixed": "#ffdad7",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary": "#416652",
                        "tertiary-container": "#ba5855",
                        "outline-variant": "#bdcac0",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary": "#9b403e",
                        "surface-variant": "#e1e3e4",
                        "inverse-primary": "#71dba6",
                        "surface-tint": "#006c47",
                        "surface-dim": "#d9dadb",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fa"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 2px #006b4733;
            border-color: #006b47;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<!-- Header: Minimal Back Navigation -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-lg px-6 py-4 flex items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="ml-4">
<span class="font-headline text-lg font-bold tracking-tight text-slate-900">CityConnect</span>
</div>
</header>
<!-- Main Content: Verification Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 max-w-md mx-auto w-full">
<!-- Step Indicator -->
<div class="w-full flex justify-center mb-8 gap-2">
<div class="h-1.5 w-8 rounded-full bg-secondary-container"></div>
<div class="h-1.5 w-8 rounded-full bg-secondary-container"></div>
<div class="h-1.5 w-8 rounded-full bg-secondary-container"></div>
<div class="h-1.5 w-12 rounded-full bg-primary-container"></div>
</div>
<!-- Editorial Typography -->
<section class="text-center mb-10">
<h1 class="font-headline text-3xl font-extrabold text-on-surface mb-3 tracking-tight">Verify your contact</h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                We've sent a code to your mobile/email. Please enter the 6-digit verification code below.
            </p>
</section>
<!-- Verification Form -->
<div class="w-full space-y-8">
<!-- OTP Input Grid -->
<div class="grid grid-cols-6 gap-3 sm:gap-4">
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-xl font-bold bg-surface-container-low border-none rounded-xl focus:ring-0 transition-all text-on-surface" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Resend Logic -->
<div class="text-center">
<p class="text-on-surface-variant text-sm mb-2">Didn't receive the code?</p>
<button class="text-primary font-semibold text-sm hover:underline decoration-2 underline-offset-4">Resend code</button>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-[0_4px_24px_rgba(0,108,71,0.15)] active:scale-[0.98] transition-all">
                    Verify
                </button>
</div>
</div>
<!-- Security Badge (Contextual Element) -->
<div class="mt-auto pt-12 flex items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-xs font-medium uppercase tracking-widest text-on-surface-variant">Secure Verification</span>
</div>
</main>
<!-- Illustrative Background Element (Asymmetric Depth) -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-24 -left-12 w-48 h-48 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</body></html>
