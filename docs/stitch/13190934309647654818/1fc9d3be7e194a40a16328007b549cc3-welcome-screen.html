<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #006b47 0%, #00875a 100%);
        }
        .bg-mesh {
            background-color: #f8f9fa;
            background-image: radial-gradient(at 0% 0%, rgba(0, 107, 71, 0.03) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, rgba(0, 135, 90, 0.02) 0, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar (Suppressed navigation shell for focused onboarding journey, using only required elements) -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-lg dark:bg-slate-950/80 shadow-[0_4px_24px_rgba(0,108,71,0.04)] flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-700 dark:text-emerald-500" data-icon="location_city">location_city</span>
<h1 class="font-headline text-lg font-bold tracking-tight text-slate-900 dark:text-slate-50">CityConnect</h1>
</div>
<button class="text-slate-500 dark:text-slate-400 font-inter text-sm font-medium hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors px-3 py-1 rounded-lg">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col justify-center items-center px-8 pt-24 pb-12 bg-mesh">
<div class="max-w-md w-full flex flex-col items-center">
<!-- Minimal Illustration / Hero Section -->
<div class="w-full mb-12 relative aspect-[4/3] rounded-3xl overflow-hidden shadow-[0_24px_48px_rgba(0,108,71,0.08)] bg-surface-container-lowest">
<img alt="Home Sanctuary" class="w-full h-full object-cover opacity-90" data-alt="Modern minimalist living room interior with soft sunlight filtering through sheer curtains, clean lines, and a peaceful atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJ6CgfYE3uGJ6IsmghNbjp3h3DAu2xAYO8dKY09jaK1CKaKRa-pRKGLaaQr8U7uKoYyB9EGQki9knCG_KOrby0-ATQhRT3W8y5ljv0IuF8N2XhY9QIdcTj8_KGsoej4y9Ds2guJhHrB0cH4GdBPvnz-dGr57bwN1QqXJfhkor0LOgSNcEWBcLDEXKxzAOhaWLL-69LjPhZ4Ye-DrHoNAcp7SgCkz7jJ2hTDiu2IVOg5wq-akqUUyE_y-k-kvr9JtPm_bmxUToHqVu8"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
<div class="absolute bottom-6 left-6 flex items-center gap-3 bg-white/90 backdrop-blur-md py-3 px-4 rounded-xl shadow-sm">
<div class="w-10 h-10 rounded-full signature-gradient flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<div>
<p class="text-[10px] text-on-surface-variant font-label uppercase tracking-widest font-semibold">Reliable</p>
<p class="text-xs font-bold text-on-surface">Verified Providers</p>
</div>
</div>
</div>
<!-- Content Hierarchy -->
<div class="text-center space-y-6">
<h2 class="font-headline text-[32px] leading-[1.1] font-extrabold tracking-tight text-on-surface">
                    Manage your home services <span class="text-primary">effortlessly</span>
</h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-normal">
                    Connect with reliable providers for all your home needs in one place.
                </p>
</div>
<!-- Interaction Area -->
<div class="w-full mt-12 space-y-6">
<!-- Primary CTA -->
<button class="w-full py-4 px-6 signature-gradient text-on-primary font-headline font-bold text-lg rounded-xl shadow-[0_8px_16px_rgba(0,107,71,0.2)] active:scale-95 transition-all duration-150">
                    Get Started
                </button>
<!-- Secondary Action -->
<div class="text-center">
<p class="text-on-surface-variant font-body">
                        Already have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="#">Sign in</a>
</p>
</div>
</div>
<!-- Asymmetric Accent -->
<div class="mt-16 flex justify-center gap-1.5">
<div class="w-8 h-1.5 rounded-full signature-gradient"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</main>
<!-- Footer Trust Badges (Minor context for "Sanctuary" feel) -->
<footer class="pb-8 px-6 text-center">
<div class="flex items-center justify-center gap-8 opacity-40 grayscale contrast-125">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="shield">shield</span>
<span class="text-[10px] font-bold tracking-tighter font-headline">SECURE</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="star">star</span>
<span class="text-[10px] font-bold tracking-tighter font-headline">RATED 4.9</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="map">map</span>
<span class="text-[10px] font-bold tracking-tighter font-headline">CITYWIDE</span>
</div>
</div>
</footer>
