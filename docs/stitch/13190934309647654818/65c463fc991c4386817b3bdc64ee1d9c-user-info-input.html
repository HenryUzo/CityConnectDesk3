<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

          extend: {
            "colors": {

                    "on-primary": "#ffffff",
                    "on-primary-container": "#ffffff",
                    "primary-container": "#00875a",
                    "secondary-fixed": "#c2ecd2",
                    "secondary-container": "#c0e9cf",
                    "on-secondary-fixed": "#002113",
                    "on-secondary-fixed-variant": "#294e3b",
                    "on-tertiary-fixed-variant": "#7d2a2a",
                    "error-container": "#ffdad6",
                    "on-secondary-container": "#456a56",
                    "on-primary-fixed-variant": "#005235",
                    "surface-container": "#edeeef",
                    "primary-fixed-dim": "#71dba6",
                    "on-error": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "surface-container-low": "#f3f4f5",
                    "on-error-container": "#93000a",
                    "background": "#f8f9fa",
                    "secondary-fixed-dim": "#a7d0b7",
                    "on-background": "#191c1d",
                    "primary-fixed": "#8df7c1",
                    "primary": "#006b47",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary-fixed": "#410005",
                    "outline": "#6e7a71",
                    "surface-container-high": "#e7e8e9",
                    "on-surface": "#191c1d",
                    "tertiary-fixed-dim": "#ffb3af",
                    "inverse-surface": "#2e3132",
                    "on-primary-fixed": "#002113",
                    "tertiary-fixed": "#ffdad7",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary": "#416652",
                    "tertiary-container": "#ba5855",
                    "outline-variant": "#bdcac0",
                    "surface-container-highest": "#e1e3e4",
                    "tertiary": "#9b403e",
                    "surface-variant": "#e1e3e4",
                    "inverse-primary": "#71dba6",
                    "surface-tint": "#006c47",
                    "surface-dim": "#d9dadb",
                    "error": "#ba1a1a",
                    "surface": "#f8f9fa"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #006b47 0%, #00875a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar Navigation Shell Suppressed per Transactional Rule -->
<!-- Content starts here -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<!-- Step Indicator -->
<div class="flex items-center gap-2 mb-10 justify-center">
<div class="h-1.5 w-8 rounded-full bg-secondary-fixed"></div>
<div class="h-1.5 w-8 rounded-full bg-secondary-fixed"></div>
<div class="h-1.5 w-12 rounded-full bg-primary-container"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
</div>
<!-- Header Section -->
<header class="text-center mb-10">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-3">A bit about you</h1>
<p class="text-on-surface-variant text-base">Let's get your profile started.</p>
</header>
<!-- Form Section -->
<div class="space-y-8">
<div class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="full-name">
                            Full Name
                        </label>
<input class="w-full px-4 py-4 bg-surface-container-low border border-outline-variant/20 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-container-lowest transition-all outline-none text-on-surface placeholder:text-outline-variant" id="full-name" name="full-name" placeholder="e.g. Julian Rivers" type="text"/>
</div>
<!-- Contact Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="contact">
                            Email or Phone Number
                        </label>
<input class="w-full px-4 py-4 bg-surface-container-low border border-outline-variant/20 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-container-lowest transition-all outline-none text-on-surface placeholder:text-outline-variant" id="contact" name="contact" placeholder="hello@cityconnect.com" type="text"/>
<p class="text-[12px] text-on-secondary-container/70 mt-2 px-1">
                            We'll use this to verify your account and send important city updates.
                        </p>
</div>
</div>
<!-- Action Section -->
<div class="pt-4 space-y-4">
<!-- Disabled State Shown -->
<button class="w-full py-4 rounded-xl font-semibold text-on-primary bg-surface-dim cursor-not-allowed opacity-60 flex justify-center items-center gap-2" disabled="">
                        Continue
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-3 text-sm font-medium text-primary hover:text-on-primary-fixed-variant transition-colors">
                        I'll do this later
                    </button>
</div>
</div>
<!-- Visual Anchor / Decorative Element -->
<div class="mt-16 relative overflow-hidden rounded-3xl aspect-[16/9] shadow-sm">
<img alt="Community space" class="absolute inset-0 w-full h-full object-cover" data-alt="Modern minimalist co-working space with soft natural morning light coming through large windows and clean wooden furniture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyhKmUdzu46ajTzgEi8LgiaCmdK_Xf9IOsRaMXMdiQlKGcf1Zd8-wHXP_vfX5GH1o_AbI93OLW9jJybDIal_XNw9uhymRskapDHzsRTuZ5po0KHKtNcQAvjHHbKgcOWGJXCE1PWZ14siBPu_Eh7P25_PhBj620ID_RAJM6Rv8aqDj-FbebMHnfaiz1h8eB70WkD_sjU4F3q_yt2dia6TWwQ0eJx7Rkz1Em58zqHW_C8YYe633ne44bX2TlQsSO2SSbtVwI3ezlTEyF"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent"></div>
<div class="absolute bottom-4 left-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="verified_user">verified_user</span>
<span class="text-[11px] font-medium tracking-wide text-on-surface-variant">Your data is encrypted and secure.</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed per Destination Rule -->
</body></html>
